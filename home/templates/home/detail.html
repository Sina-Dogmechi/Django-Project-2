{% extends 'base.html' %}

{% block title %}Detail{% endblock %}

{% block content %}
    <h2>{{ product.name }}</h2>
    <small>{{ product.created }}</small><br/>
    <p>{{ product.price }} Toman</p>
    <img src="{{ product.image.url }}" style="width: 300px">
    <p>{{ product.description | safe}}</p><br/><br/>

    <form action="{% url 'orders:cart_add' product.id %}" method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="add to cart">
    </form>
{% endblock %}
